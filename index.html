<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Treino - Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0b0d19;
            color: #f3f4f6;
        }
        .bg-card {
            background-color: #111424;
        }
        .border-neon {
            border-color: #2a2f4c;
        }
        .btn-purple {
            background: linear-gradient(90deg, #a855f7 0%, #ec4899 100%);
        }
        .selected-group {
            border-color: #ec4899 !important;
            background-color: rgba(236, 72, 153, 0.1) !important;
        }
        .selected-feeling {
            border-color: #a855f7 !important;
            background-color: rgba(168, 85, 247, 0.1) !important;
        }
        input, textarea, select {
            background-color: #161a30 !important;
            border-color: #2a2f4c !important;
            color: #ffffff !important;
        }
    </style>
</head>
<body class="p-4 md:p-8 max-w-3xl mx-auto font-sans">

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="p-3 bg-purple-900/40 rounded-xl text-purple-400 text-2xl">
                <i class="fa-solid fa-dumbbell"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-wide">Novo Treino</h1>
                <p class="text-gray-400 text-sm">Registre e acompanhe seu treino</p>
            </div>
        </div>
        <button onclick="clearAll()" class="border border-red-500/30 text-red-400 px-3 py-1.5 rounded-lg text-sm hover:bg-red-500/10 transition flex items-center gap-2">
            <i class="fa-regular fa-trash-can"></i> Limpar tudo
        </button>
    </div>

    <div class="bg-card p-5 rounded-xl border border-neon mb-6">
        <label class="block text-purple-400 text-sm font-semibold mb-2">1. Data do treino</label>
        <div class="relative">
            <input type="date" id="training-date" class="w-full p-3 rounded-lg border text-left focus:outline-none focus:border-purple-500">
        </div>
    </div>

    <div class="bg-card p-5 rounded-xl border border-neon mb-6">
        <label class="block text-purple-400 text-sm font-semibold mb-1">2. Grupo muscular</label>
        <p class="text-gray-400 text-xs mb-4">Selecione um ou mais grupos trabalhados</p>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="muscle-groups">
            </div>

        <div id="selected-badge-container" class="mt-4 p-3 bg-[#161a30] rounded-lg border border-purple-500/20 text-sm hidden justify-between items-center">
            <span class="text-purple-300" id="selected-badge-text">📌 Selecionados: Nenhum</span>
            <button onclick="clearSelectedMuscles()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div class="bg-card p-5 rounded-xl border border-neon">
            <label class="block text-purple-400 text-sm font-semibold mb-3">3. Duração (min)</label>
            <div class="flex items-center bg-[#161a30] border border-neon rounded-lg px-3">
                <input type="number" id="duration" value="60" class="w-full bg-transparent p-3 border-none focus:outline-none text-xl font-bold">
                <span class="text-gray-400 text-sm">min</span>
            </div>
        </div>
        <div class="bg-card p-5 rounded-xl border border-neon">
            <label class="block text-purple-400 text-sm font-semibold mb-3">4. Como foi o treino?</label>
            <div class="grid grid-cols-4 gap-2 text-center text-xs">
                <button onclick="setFeeling('Fraco')" id="feel-Fraco" class="border border-neon p-2.5 rounded-lg hover:bg-gray-800 transition">😢<br><span class="text-gray-400 mt-1 block">Fraco</span></button>
                <button onclick="setFeeling('Ok')" id="feel-Ok" class="border border-neon p-2.5 rounded-lg hover:bg-gray-800 transition">😐<br><span class="text-gray-400 mt-1 block">Ok</span></button>
                <button onclick="setFeeling('Bom')" id="feel-Bom" class="border border-neon p-2.5 rounded-lg hover:bg-gray-800 transition">💪<br><span class="text-gray-400 mt-1 block">Bom</span></button>
                <button onclick="setFeeling('Ótimo')" id="feel-Ótimo" class="border border-neon p-2.5 rounded-lg hover:bg-gray-800 transition">🔥<br><span class="text-gray-400 mt-1 block">Ótimo</span></button>
            </div>
        </div>
    </div>

    <div class="bg-card p-5 rounded-xl border border-neon mb-6 overflow-x-auto">
        <label class="block text-purple-400 text-sm font-semibold mb-4">5. Exercícios</label>
        
        <table class="w-full text-left min-w-[600px]">
            <thead>
                <tr class="text-gray-400 text-xs uppercase border-b border-neon pb-2">
                    <th class="pb-3 w-1/3">Exercício</th>
                    <th class="pb-3 text-center">Séries</th>
                    <th class="pb-3 text-center">Repetições</th>
                    <th class="pb-3 text-center">Peso (kg)</th>
                    <th class="pb-3 text-center w-12">Ações</th>
                </tr>
            </thead>
            <tbody id="exercise-rows">
                </tbody>
        </table>

        <button onclick="addExerciseRow()" class="w-full mt-4 p-3 border border-dashed border-purple-500/40 rounded-xl text-purple-400 hover:bg-purple-500/5 transition flex items-center justify-center gap-2 font-medium">
            <i class="fa-solid fa-circle-plus"></i> Adicionar exercício
        </button>
    </div>

    <div class="bg-card p-5 rounded-xl border border-neon mb-6">
        <label class="block text-purple-400 text-sm font-semibold mb-2">📝 6. Observações <span class="text-gray-500 font-normal">(opcional)</span></label>
        <textarea id="observations" rows="3" placeholder="Anotações, PR novo, dores, observações sobre o treino..." class="w-full p-3 rounded-lg border text-sm focus:outline-none focus:border-purple-500 resize-none"></textarea>
    </div>

    <button onclick="saveWorkout()" class="w-full btn-purple py-4 rounded-xl font-bold text-lg shadow-lg shadow-pink-500/20 hover:opacity-95 transition flex items-center justify-center gap-2">
        <i class="fa-regular fa-floppy-disk"></i> Salvar treino
    </button>

    <div id="history-box" class="mt-8 bg-card p-5 rounded-xl border border-neon hidden">
        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">Último Treino Salvo</h3>
        <pre id="history-data" class="text-xs text-purple-300 bg-black/30 p-3 rounded overflow-x-auto"></pre>
    </div>

    <script>
        const muscles = [
            { id: 'peito', label: 'Peito', icon: '🏋️‍♂️' },
            { id: 'costas', label: 'Costas', icon: '↔️' },
            { id: 'quadriceps', label: 'Quadríceps', icon: '🦵' },
            { id: 'posterior', label: 'Posterior', icon: '🧍' },
            { id: 'gluteos', label: 'Glúteos', icon: '🍑' },
            { id: 'ombros', label: 'Ombros', icon: '🎯' },
            { id: 'biceps', label: 'Bíceps', icon: '💪' },
            { id: 'triceps', label: 'Tríceps', icon: '💪' },
            { id: 'abdomen', label: 'Abdômen', icon: '⚡' },
            { id: 'antebraco', label: 'Antebraço', icon: '🦾' },
            { id: 'panturrilha', label: 'Panturrilha', icon: '🦶' },
            { id: 'cardio', label: 'Cardio', icon: '🏃‍♂️' },
            { id: 'fullbody', label: 'Full Body', icon: '🔥' }
        ];

        let selectedMuscles = [];
        let currentFeeling = '';

        // Definir a data de hoje por padrão
        document.getElementById('training-date').valueAsDate = new Date();

        // Renderizar botões de músculos
        const muscleContainer = document.getElementById('muscle-groups');
        muscles.forEach(m => {
            const btn = document.createElement('button');
            btn.className = "flex items-center justify-between border border-neon p-3 rounded-lg hover:bg-gray-800/50 transition text-sm";
            btn.id = `muscle-${m.id}`;
            btn.onclick = () => toggleMuscle(m.id, m.label);
            btn.innerHTML = `<span>${m.icon} ${m.label}</span><i class="fa-regular fa-circle-check opacity-20 text-xs check-icon"></i>`;
            muscleContainer.appendChild(btn);
        });

        function toggleMuscle(id, label) {
            const btn = document.getElementById(`muscle-${id}`);
            const check = btn.querySelector('.check-icon');
            
            if(selectedMuscles.includes(label)) {
                selectedMuscles = selectedMuscles.filter(item => item !== label);
                btn.classList.remove('selected-group');
                check.className = "fa-regular fa-circle-check opacity-20 text-xs check-icon";
            } else {
                selectedMuscles.push(label);
                btn.classList.add('selected-group');
                check.className = "fa-solid fa-circle-check text-pink-500 text-xs check-icon";
            }
            updateMuscleBadge();
        }

        function updateMuscleBadge() {
            const container = document.getElementById('selected-badge-container');
            const text = document.getElementById('selected-badge-text');
            if(selectedMuscles.length > 0) {
                container.classList.remove('hidden');
                container.classList.add('flex');
                text.innerText = `🟣 Selecionados: ${selectedMuscles.join(', ')}`;
            } else {
                container.classList.remove('flex');
                container.classList.add('hidden');
            }
        }

        function clearSelectedMuscles() {
            selectedMuscles = [];
            muscles.forEach(m => {
                document.getElementById(`muscle-${m.id}`).classList.remove('selected-group');
                document.getElementById(`muscle-${m.id}`).querySelector('.check-icon').className = "fa-regular fa-circle-check opacity-20 text-xs check-icon";
            });
            updateMuscleBadge();
        }

        function setFeeling(feeling) {
            ['Fraco', 'Ok', 'Bom', 'Ótimo'].forEach(f => {
                document.getElementById(`feel-${f}`).classList.remove('selected-feeling');
            });
            currentFeeling = feeling;
            document.getElementById(`feel-${feeling}`).classList.add('selected-feeling');
        }

        // Configuração inicial de "Como foi o treino" igual à imagem (Bom marcado)
        setFeeling('Bom');

        // Gerenciamento de linhas da Tabela de Exercícios
        function addExerciseRow(name = '', sets = 4, reps = '12, 12, 10, 8', weight = '30, 35, 35, 40') {
            const tbody = document.getElementById('exercise-rows');
            const tr = document.createElement('tr');
            tr.className = "border-b border-neon/50 text-sm";
            
            tr.innerHTML = `
                <td class="py-3 pr-2">
                    <input type="text" value="${name}" placeholder="Ex: Supino reto" class="w-full bg-[#161a30] border border-neon rounded px-2.5 py-1.5 text-sm focus:outline-none focus:border-purple-500">
                </td>
                <td class="py-3 text-center">
                    <div class="flex items-center justify-center gap-1">
                        <button onclick="changeSet(this, -1)" class="w-6 h-6 bg-gray-800 rounded border border-neon flex items-center justify-center text-xs hover:bg-gray-700">-</button>
                        <span class="set-count font-bold w-6">${sets}</span>
                        <button onclick="changeSet(this, 1)" class="w-6 h-6 bg-gray-800 rounded border border-neon flex items-center justify-center text-xs hover:bg-gray-700">+</button>
                    </div>
                </td>
                <td class="py-3 px-2">
                    <input type="text" value="${reps}" placeholder="12, 10, 8" class="w-full bg-[#161a30] border border-neon rounded px-2 py-1.5 text-center text-xs">
                </td>
                <td class="py-3 px-2">
                    <input type="text" value="${weight}" placeholder="20, 25, 30" class="w-full bg-[#161a30] border border-neon rounded px-2 py-1.5 text-center text-xs">
                </td>
                <td class="py-3 text-center">
                    <button onclick="this.closest('tr').remove()" class="text-red-400 hover:text-red-500 p-1"><i class="fa-regular fa-trash-can"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        }

        function changeSet(btn, val) {
            const span = btn.parentElement.querySelector('.set-count');
            let current = parseInt(span.innerText);
            current = Math.max(1, current + val);
            span.innerText = current;
        }

        // Criar as linhas padrão da imagem do usuário
        addExerciseRow('Supino reto', 4, '12, 12, 10, 8', '30, 35, 35, 40');
        addExerciseRow('Agachamento livre', 4, '10, 10, 8, 8', '40, 45, 50, 55');
        addExerciseRow('Elevação pélvica', 4, '15, 12, 12, 10', '20, 22.5, 25, 27.5');

        function clearAll() {
            if(confirm("Deseja realmente limpar todos os campos atuais?")) {
                clearSelectedMuscles();
                document.getElementById('exercise-rows').innerHTML = '';
                document.getElementById('observations').value = '';
                document.getElementById('duration').value = 60;
                setFeeling('Bom');
            }
        }

        function saveWorkout() {
            const date = document.getElementById('training-date').value;
            const duration = document.getElementById('duration').value;
            const obs = document.getElementById('observations').value;

            // Extrair dados da tabela
            const rows = document.querySelectorAll('#exercise-rows tr');
            let exercisesList = [];
            
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                const name = inputs[0].value.trim();
                const sets = row.querySelector('.set-count').innerText;
                const reps = inputs[1].value;
                const weight = inputs[2].value;

                if (name) {
                    exercisesList.push({ name, sets, reps, weight });
                }
            });

            const workoutData = {
                data: date,
                gruposMusculares: selectedMuscles,
                duracaoMinutos: duration,
                feeling: currentFeeling,
                exercicios: exercisesList,
                observacoes: obs
            };

            // Salvar no LocalStorage (Memória do Navegador)
            localStorage.setItem('ultimoTreino', JSON.stringify(workoutData));

            // Exibir na tela para confirmar que foi salvo
            document.getElementById('history-box').classList.remove('hidden');
            document.getElementById('history-data').innerText = JSON.stringify(workoutData, null, 2);

            alert('Treino salvo localmente com sucesso! 💪');
        }

        // Resgatar último treino salvo se houver
        window.onload = function() {
            const saved = localStorage.getItem('ultimoTreino');
            if(saved) {
                document.getElementById('history-box').classList.remove('hidden');
                document.getElementById('history-data').innerText = JSON.stringify(JSON.parse(saved), null, 2);
            }
        }
    </script>
</body>
</html>
